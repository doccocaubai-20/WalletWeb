<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - NovaPay</title>
    <link rel="icon" type="image/png" href="images/icon/favicon.png">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-soft-purple"> 
    <div class="auth-card">
        <div class="auth-logo">N</div>
        
        <div class="text-center mb-4">
            <h3 class="fw-bold text-dark">Đăng nhập</h3>
            <p class="text-muted small">Chào mừng bạn quay trở lại với NovaPay</p>
        </div>

        <form onsubmit="handleLogin(event)">
            <div class="mb-3">
                <label class="form-label fw-bold small text-muted">Tài khoản</label>
                <div class="input-group">
                    <span clasrounded-circles="input-group-text bg-light border-end-0 rounded-start-3 ps-3">
                        <i class="bi bi-person text-purple"></i>
                    </span>
                    <input type="text" class="form-control form-control-lg bg-light border-start-0 rounded-end-3 ps-0" placeholder="SĐT / CCCD" required>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold small text-muted">Mật khẩu</label>
                <div class="input-group">
                    <span class="input-group-text bg-light border-end-0 rounded-start-3 ps-3">
                        <i class="bi bi-lock text-purple"></i>
                    </span>
                    <input type="password" class="form-control form-control-lg bg-light border-start-0 rounded-end-3 ps-0" placeholder="••••••••" required>
                </div>
            </div>

            <div class="d-flex justify-content-between align-items-center mb-4">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="rememberMe">
                    <label class="form-check-label small text-muted cursor-pointer" for="rememberMe">Ghi nhớ</label>
                </div>
                <a href="#" class="text-decoration-none small fw-bold text-purple">Quên mật khẩu?</a>
            </div>

            <button type="submit" class="btn btn-primary-custom w-100 py-3 rounded-3 fw-bold shadow">
                Đăng Nhập
            </button>
        </form>

        <p class="text-center mt-4 mb-0 text-muted small">
            Chưa có ví NovaPay? <a href="register.html" class="fw-bold text-decoration-none text-purple ms-1">Tạo ngay</a>
        </p>
    </div>

    <script>
        function handleLogin(e) {
            e.preventDefault();
            window.location.href = 'dashboard.html';
        }
    </script>
</body>
</html>
