<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hồ sơ cá nhân - NovaPay</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body class="bg-light">

    <div class="d-flex" id="wrapper">
        
        <div class="bg-white border-end" id="sidebar-wrapper">
            <div class="sidebar-heading text-center py-4 primary-text fs-4 fw-bold border-bottom">
                <div class="d-flex align-items-center justify-content-center gap-2">
                    <div class="logo-icon-sm">N</div>
                    <span class="text-purple">NovaPay</span>
                </div>
            </div>
            <div class="list-group list-group-flush my-3">
                <a href="dashboard.html" class="list-group-item list-group-item-action bg-transparent second-text fw-bold">
                    <i class="bi bi-wallet2 me-2"></i>Tổng quan ví
                </a>
                
                <a href="profile.html" class="list-group-item list-group-item-action bg-transparent second-text active">
                    <i class="bi bi-person-circle me-2"></i>Hồ sơ cá nhân
                </a>
            </div>
        </div>

        <div id="page-content-wrapper">
            
            <nav class="navbar navbar-expand-lg navbar-light bg-white py-3 px-4 border-bottom">
                <div class="d-flex align-items-center">
                    <i class="bi bi-list fs-4 me-3" id="menu-toggle" style="cursor: pointer;"></i>
                    <h4 class="m-0 fw-bold">Cài đặt tài khoản</h4>
                </div>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarSupportedContent">
                    <ul class="navbar-nav ms-auto mb-2 mb-lg-0 align-items-center gap-3">
                        <li class="nav-item dropdown">
                            <a class="nav-link dropdown-toggle d-flex align-items-center gap-2" href="#" id="navbarDropdown" role="button" data-bs-toggle="dropdown">
                                <img src="https://i.pravatar.cc/150?img=11" class="rounded-circle border" width="40" height="40" alt="Avatar">
                                <span class="fw-bold text-dark d-none d-md-block">Huy Le</span>
                            </a>
                            <ul class="dropdown-menu dropdown-menu-end border-0 shadow mt-2">
                                <li><a class="dropdown-item py-2 text-danger fw-bold" href="login.html"><i class="bi bi-box-arrow-right me-2"></i>Đăng xuất</a></li>
                            </ul>
                        </li>
                    </ul>
                </div>
            </nav>

            <div class="container-fluid px-4 py-4">
                
                <div class="row">
                    <div class="col-xl-4 mb-4">
                        <div class="bg-white rounded-4 shadow-sm h-100 overflow-hidden">
                            <div class="p-4 border-bottom bg-light text-center">
                                <div class="position-relative d-inline-block mb-3">
                                    <img src="https://i.pravatar.cc/150?img=11" alt="Profile" class="rounded-circle border border-3 border-white shadow-sm" width="120" height="120" id="avatarPreview">
                                    <label for="avatarUpload" class="position-absolute bottom-0 end-0 bg-white p-2 rounded-circle shadow-sm border cursor-pointer hover-purple">
                                        <i class="bi bi-camera-fill text-purple"></i>
                                    </label>
                                    <input type="file" id="avatarUpload" class="d-none" accept="image/*" onchange="previewImage(event)">
                                </div>
                                <h5 class="fw-bold mb-1">Huy Lê</h5>
                                <p class="text-muted small mb-2">Sinh viên PTIT</p>
                                <span class="badge bg-success-subtle text-success rounded-pill px-3 py-2">
                                    <i class="bi bi-shield-check me-1"></i>Đã xác thực
                                </span>
                            </div>
                            
                            <div class="p-4">
                                <div class="d-flex justify-content-between mb-3">
                                    <span class="text-muted small fw-bold">Thành viên từ</span>
                                    <span class="fw-bold text-dark">20/08/2023</span>
                                </div>
                                <div class="d-flex justify-content-between mb-3">
                                    <span class="text-muted small fw-bold">Hạng thành viên</span>
                                    <span class="text-warning fw-bold"><i class="bi bi-star-fill me-1"></i>Gold</span>
                                </div>
                                <div class="d-flex justify-content-between">
                                    <span class="text-muted small fw-bold">Bảo mật 2 lớp</span>
                                    <div class="form-check form-switch">
                                        <input class="form-check-input" type="checkbox" role="switch" checked>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="col-xl-8">
                        <div class="bg-white rounded-4 shadow-sm mb-4">
                            <div class="p-4 border-bottom">
                                <h5 class="fw-bold m-0"><i class="bi bi-person-lines-fill me-2 text-purple"></i>Thông tin chi tiết</h5>
                            </div>
                            <div class="p-4">
                                <form>
                                    <div class="row g-3">
                                        <div class="col-md-6">
                                            <label class="form-label small fw-bold text-muted">Họ và tên</label>
                                            <input type="text" class="form-control" value="Huy Le">
                                        </div>
                                        
                                        <div class="col-md-6">
                                            <label class="form-label small fw-bold text-muted">Ngày sinh</label>
                                            <input type="date" class="form-control" value="2003-05-15">
                                        </div>

                                        <div class="col-md-6">
                                            <label class="form-label small fw-bold text-muted">Số điện thoại <i class="bi bi-lock-fill ms-1 text-muted" title="Không thể thay đổi"></i></label>
                                            <input type="text" class="form-control bg-light" value="0912345678" readonly>
                                        </div>

                                        <div class="col-md-6">
                                            <label class="form-label small fw-bold text-muted">Email liên kết</label>
                                            <input type="email" class="form-control" value="huyle.student@ptit.edu.vn">
                                        </div>

                                        <div class="col-12">
                                            <label class="form-label small fw-bold text-muted">Địa chỉ hiện tại</label>
                                            <input type="text" class="form-control" value="Hà Đông, Hà Nội">
                                        </div>
                                        
                                        <div class="col-md-6">
                                            <label class="form-label small fw-bold text-muted">Số CCCD / CMND</label>
                                            <input type="text" class="form-control bg-light" value="0012030xxxxx" readonly>
                                        </div>

                                        <div class="col-md-6">
                                            <label class="form-label small fw-bold text-muted">Giới tính</label>
                                                <select class="form-select">
                                                    <option value="nam" selected>Nam</option>
                                                    <option value="nu">Nữ</option>
                                                    <option value="khac">Khác</option>
                                                </select>    
                                        </div>
                                    </div>
                                    
                                    <div class="mt-4 text-end">
                                        <button type="button" class="btn btn-primary-custom px-4 shadow py-2">Lưu thay đổi</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                        
                        <div class="bg-white rounded-4 shadow-sm">
                            <div class="p-4 border-bottom">
                                <h5 class="fw-bold m-0"><i class="bi bi-shield-lock me-2 text-purple"></i>Bảo mật & Mật khẩu</h5>
                            </div>
                            <div class="p-4">
                                <div class="row">
                                    <div class="col-md-4">
                                        <button type="button" class="btn btn-outline-custom w-100">Đổi mật khẩu</button>
                                    </div>
                                </div>
                            </div>
                        </div>

                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Toggle Sidebar
        var el = document.getElementById("wrapper");
        var toggleButton = document.getElementById("menu-toggle");
        toggleButton.onclick = function () { el.classList.toggle("toggled"); };

        // Preview ảnh khi upload Avatar
        function previewImage(event) {
            var reader = new FileReader();
            reader.onload = function(){
                var output = document.getElementById('avatarPreview');
                output.src = reader.result;
            };
            reader.readAsDataURL(event.target.files[0]);
        }
    </script>
</body>
</html>
