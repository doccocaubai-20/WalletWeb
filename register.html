<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký tài khoản - NovaPay</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="container-fluid min-vh-100">
        <div class="row g-0 min-vh-100">
            <div class="col-lg-6 d-none d-lg-flex flex-column bg-branding text-white p-5 justify-content-between">
                
                <div class="branding-header">
                    <div class="d-flex align-items-center gap-3 mb-4">
                        <div class="logo-circle mx-0">N</div>
                        <h1 class="fw-bold m-0">NovaPay</h1>
                    </div>
                </div>

                <div class="branding-image my-5 text-center">
                    <img src="./images/img/cardts.png" alt="NovaPay Illustration" class="img-fluid floating-img" style="max-width: 50%; drop-shadow: 0 20px 40px rgba(0,0,0,0.2);">
                </div>

                <div class="branding-features d-flex gap-4 mt-auto">
                    <div class="feature-item">
                        <i class="bi bi-shield-check fs-3 text-warning mb-2 d-block"></i>
                        <span class="fw-bold d-block">An toàn 100%</span>
                        <small class="opacity-75">Bảo mật đa lớp</small>
                    </div>
                    <div class="feature-item">
                        <i class="bi bi-lightning-charge fs-3 text-info mb-2 d-block"></i>
                        <span class="fw-bold d-block">Siêu tốc</span>
                        <small class="opacity-75">Giao dịch tức thì</small>
                    </div>
                    <div class="feature-item">
                        <i class="bi bi-gift fs-3 text-danger mb-2 d-block"></i>
                        <span class="fw-bold d-block">Nhiều ưu đãi</span>
                        <small class="opacity-75">Dành cho mọi người</small>
                    </div>
                </div>

            </div>

            <div class="col-lg-6 d-flex align-items-center justify-content-center bg-white py-5">
                <div class="register-box px-4 px-md-5 w-100" style="max-width: 600px;">
                    
                    <div class="d-lg-none text-center mb-4">
                        <h2 class="fw-bold text-primary-custom">NovaPay</h2>
                    </div>

                    <div class="mb-4">
                        <h2 class="fw-bold">Đăng ký tài khoản</h2>
                        <p class="text-muted" id="step-title">Nhập thông tin cá nhân của bạn</p>
                        
                        <div class="progress" style="height: 4px;">
                            <div class="progress-bar bg-primary-custom" id="progressBar" role="progressbar" style="width: 50%"></div>
                        </div>
                    </div>

                    <form id="registerForm">
                        
                        <div id="step1">
                            <div class="mb-3">
                                <label class="form-label fw-bold small">Họ và tên</label>
                                <input type="text" class="form-control form-control-lg bg-light border-0" placeholder="Lê Quang Huy">
                            </div>
                            
                            <div class="mb-3">
                                <label class="form-label fw-bold small">Số CCCD / CMND</label>
                                <input type="text" class="form-control form-control-lg bg-light border-0" placeholder="0012xxxxxxxxx">
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold small">Ngày sinh</label>
                                <input type="date" class="form-control form-control-lg bg-light border-0">
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold small">Số điện thoại</label>
                                <input type="tel" class="form-control form-control-lg bg-light border-0" placeholder="09xxxxxxxxx">
                            </div>

                            <div class="mb-4">
                                <label class="form-label fw-bold small">Địa chỉ Email</label>
                                <input type="email" class="form-control form-control-lg bg-light border-0" placeholder="a@email.com">
                            </div>

                            <button type="button" onclick="goToStep2()" class="btn btn-primary-custom w-100 py-3 rounded-3 fw-bold shadow">
                                Tiếp tục <i class="bi bi-arrow-right ms-2"></i>
                            </button>
                        </div>

                        <div id="step2" style="display: none;">
                            <div class="mb-3">
                                <label class="form-label fw-bold small">Tên đăng nhập (Username)</label>
                                <input type="text" class="form-control form-control-lg bg-light border-0" placeholder="user123">
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold small">Mật khẩu</label>
                                <input type="password" class="form-control form-control-lg bg-light border-0" placeholder="••••••••">
                            </div>

                            <div class="mb-4">
                                <label class="form-label fw-bold small">Xác nhận mật khẩu</label>
                                <input type="password" class="form-control form-control-lg bg-light border-0" placeholder="••••••••">
                            </div>

                            <div class="d-flex gap-3">
                                <button type="button" onclick="backToStep1()" class="btn btn-light w-50 py-3 rounded-3 fw-bold text-muted">
                                    Quay lại
                                </button>
                                <button type="button" onclick="submitForm()" class="btn btn-primary-custom w-50 py-3 rounded-3 fw-bold shadow">
                                    Đăng ký ngay
                                </button>
                            </div>
                        </div>

                    </form>

                    <p class="text-center mt-4 text-muted small">
                        Đã có tài khoản? <a href="login.html" class="fw-bold text-decoration-none" style="color: var(--primary-color);">Đăng nhập</a>
                    </p>

                </div>
            </div>
        </div>
    </div>

    <script>
        function goToStep2() {
            // Ẩn bước 1, hiện bước 2
            document.getElementById('step1').style.display = 'none';
            document.getElementById('step2').style.display = 'block';
            
            // Cập nhật tiêu đề và thanh tiến trình
            document.getElementById('step-title').innerText = 'Thiết lập thông tin bảo mật';
            document.getElementById('progressBar').style.width = '100%';
        }

        function backToStep1() {
            // Ẩn bước 2, hiện lại bước 1
            document.getElementById('step2').style.display = 'none';
            document.getElementById('step1').style.display = 'block';
            
            // Cập nhật lại thanh tiến trình
            document.getElementById('step-title').innerText = 'Nhập thông tin cá nhân của bạn';
            document.getElementById('progressBar').style.width = '50%';
        }

        function submitForm() {
            alert('Đăng ký thành công! Đang chuyển về trang đăng nhập...');
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
